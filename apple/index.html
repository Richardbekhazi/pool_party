<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="js/nav.js" defer></script>
  <script src="js/theme.js" defer></script>
  <title>Apple Farewell</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/landing.css">
  <script src="js/apple-hero.js" defer></script>
  <script src="js/ticker.js" defer></script>
</head>
<body>
  <!-- Ambient floating bubbles -->
  <div class="bubbles" aria-hidden="true">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <main class="wrap">
    <article class="card">

      <!-- Header -->
      <header class="landing-header">
        <a href="index.html" class="title-link">
          <h1>🍎 Apple Farewell</h1>
          <span class="hint">Dashboard</span>
        </a>
        <div class="header-actions">
          <!-- nav.js injects content here -->
        </div>
      </header>

      <!-- Hero: Random photo from local pics -->
      <figure id="hero" class="hero" aria-label="Random farewell photo">
        <img id="heroImg" alt="Apple farewell photo">
        <div class="hero-overlay">
          <div class="hero-overlay-content">
            <span class="hero-tag">✦ Farewell Gathering</span>
            <h2 class="hero-title">Farewell, Apple</h2>
            <p class="hero-subtitle">Thank you for all the memories we shared together.</p>
          </div>
        </div>
        <div class="hero-wave" aria-hidden="true">
          <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
            <path class="wave wave-back" d="M0,80 C300,30 600,100 900,50 C1100,20 1300,70 1440,80 L1440,120 L0,120 Z" />
            <path class="wave wave-front" d="M0,64 C360,110 720,10 1080,64 C1260,96 1380,80 1440,64 L1440,120 L0,120 Z" />
          </svg>
        </div>
        <figcaption id="heroCaption" class="hero-caption"></figcaption>
      </figure>

      <!-- Quick Stats Ribbon -->
      <section class="landing-ribbon" aria-label="Event highlights">
        <div class="ribbon-item">
          <span class="ribbon-number" id="ribbonGuests">—</span>
          <span class="ribbon-label">Guests</span>
        </div>
        <div class="ribbon-divider"></div>
        <div class="ribbon-item">
          <span class="ribbon-number">1</span>
          <span class="ribbon-label">Special Day</span>
        </div>
        <div class="ribbon-divider"></div>
        <div class="ribbon-item">
          <span class="ribbon-number">∞</span>
          <span class="ribbon-label">Memories</span>
        </div>
      </section>

      <!-- Dashboard Portals -->
      <section class="dashboard-grid">
        <a href="money.html" class="portal-card accent">
          <div class="portal-icon">💸</div>
          <div class="portal-content">
            <h2>Money & Guests</h2>
            <p>$30/adult, $15/kid. See who's coming and payment status.</p>
          </div>
          <div class="portal-arrow">&rarr;</div>
        </a>

        <a href="pictures.html" class="portal-card">
          <div class="portal-icon">📸</div>
          <div class="portal-content">
            <h2>Gallery</h2>
            <p>Browse farewell photos and memories with Apple.</p>
          </div>
          <div class="portal-arrow">&rarr;</div>
        </a>
      </section>

      <!-- Footer: Ticker -->
      <footer>
        <div class="ticker">
          <div class="ticker-viewport">
            <div class="ticker-track">
              <div class="pass">
                <span class="ticker-item">Farewell, Apple</span>
                <span class="ticker-sep">✦</span>
                <span class="ticker-item">Check the gallery</span>
              </div>
            </div>
          </div>
        </div>
        <div class="landing-footer-hint">
          A random memory on every visit ✨
        </div>
      </footer>

    </article>
  </main>

  <script>
    // Update ribbon guest count from attendees data
    fetch("data/attendees.json")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var el = document.getElementById("ribbonGuests");
        if (el) el.textContent = data.length;
      })
      .catch(function() {});
  </script>
</body>
</html>
